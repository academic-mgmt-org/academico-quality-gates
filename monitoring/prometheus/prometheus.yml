global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: blackbox-exporter
    static_configs:
      - targets:
          - blackbox-exporter:9115

  - job_name: core_http_health
    metrics_path: /probe
    params:
      module:
        - http_2xx
    static_configs:
      - targets: ["http://host.docker.internal:3000/api/health"]
        labels:
          service: academico-gateway
          tier: edge
      - targets: ["http://host.docker.internal:3001/api/health"]
        labels:
          service: academico-login
          tier: auth
      - targets: ["http://host.docker.internal:3002/api/health"]
        labels:
          service: academico-calificaciones
          tier: academic
      - targets: ["http://host.docker.internal:3003/api/health"]
        labels:
          service: academico-notificaciones
          tier: academic
      - targets: ["http://host.docker.internal:3004/api/health"]
        labels:
          service: academico-matriculas
          tier: academic
      - targets: ["http://host.docker.internal:3005/api/health"]
        labels:
          service: academico-solicitudes
          tier: academic
      - targets: ["http://host.docker.internal:3006/api/health"]
        labels:
          service: academico-usuarios
          tier: identity
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: core_http_readiness
    metrics_path: /probe
    params:
      module:
        - http_2xx
    static_configs:
      - targets: ["http://host.docker.internal:3000/api/ready"]
        labels:
          service: academico-gateway
          tier: edge
      - targets: ["http://host.docker.internal:3001/api/ready"]
        labels:
          service: academico-login
          tier: auth
      - targets: ["http://host.docker.internal:3002/api/ready"]
        labels:
          service: academico-calificaciones
          tier: academic
      - targets: ["http://host.docker.internal:3003/api/ready"]
        labels:
          service: academico-notificaciones
          tier: academic
      - targets: ["http://host.docker.internal:3004/api/ready"]
        labels:
          service: academico-matriculas
          tier: academic
      - targets: ["http://host.docker.internal:3005/api/ready"]
        labels:
          service: academico-solicitudes
          tier: academic
      - targets: ["http://host.docker.internal:3006/api/ready"]
        labels:
          service: academico-usuarios
          tier: identity
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: core_service_metrics
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 5s
    static_configs:
      - targets: ["host.docker.internal:3000"]
        labels:
          service: academico-gateway
          tier: edge
      - targets: ["host.docker.internal:3001"]
        labels:
          service: academico-login
          tier: auth
      - targets: ["host.docker.internal:3002"]
        labels:
          service: academico-calificaciones
          tier: academic
      - targets: ["host.docker.internal:3003"]
        labels:
          service: academico-notificaciones
          tier: academic
      - targets: ["host.docker.internal:3004"]
        labels:
          service: academico-matriculas
          tier: academic
      - targets: ["host.docker.internal:3005"]
        labels:
          service: academico-solicitudes
          tier: academic
      - targets: ["host.docker.internal:3006"]
        labels:
          service: academico-usuarios
          tier: identity

