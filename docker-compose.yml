services:
  web:
    build:
      context: .
    container_name: academico-quality-gates-web
    depends_on:
      - prometheus
      - grafana
    ports:
      - "8080:80"
    networks:
      - default
      - proxy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: academico-quality-gates-prometheus
    depends_on:
      - quality-exporter
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    restart: unless-stopped

  quality-exporter:
    build:
      context: ./exporter
    container_name: academico-quality-gates-exporter
    environment:
      ACADEMICO_TARGET_HOST: ${ACADEMICO_TARGET_HOST:-host.docker.internal}
      ACADEMICO_GATEWAY_PORT: ${ACADEMICO_GATEWAY_PORT:-3000}
      EXPORTER_PORT: "9200"
      LATENCY_THRESHOLD_SECONDS: "0.75"
      PROBE_TIMEOUT_MS: "2500"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "9200:9200"
    restart: unless-stopped

  grafana:
    image: grafana/grafana-oss:11.4.0
    container_name: academico-quality-gates-grafana
    ports:
      - "3007:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_DOMAIN: ${OBSERVABILITY_HOST}
      GF_SERVER_ROOT_URL: ${OBSERVABILITY_SCHEME:-https}://${OBSERVABILITY_HOST}/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/quality-gates.json
    depends_on:
      - prometheus
    networks:
      - default
      - proxy
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:

networks:
  proxy:
    external: true
    name: academico-web_default
