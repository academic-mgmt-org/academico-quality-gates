services:
  web:
    build:
      context: .
    container_name: academico-quality-gates-web
    depends_on:
      - prometheus
      - grafana
    ports:
      - "8080:80"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: academico-quality-gates-prometheus
    depends_on:
      - blackbox-exporter
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    restart: unless-stopped

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: academico-quality-gates-blackbox
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "9115:9115"
    volumes:
      - ./monitoring/prometheus/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana-oss:11.4.0
    container_name: academico-quality-gates-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/quality-gates.json
    depends_on:
      - prometheus
    ports:
      - "3007:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
